<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Manager - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a href="index.html" class="navbar-brand mb-0 h1">Project Manager</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small" id="navUsername"></span>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- Main -->
    <div class="container py-5">
        <h2 class="mb-1">Dashboard</h2>
        <p class="text-muted mb-4">Welcome back, <strong id="welcomeUsername"></strong>!</p>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title text-center">Projects</h5>
                        <p class="card-text text-muted text-center">Manage your projects here.</p>
                        <a href="./html/projects.html" class="btn btn-primary btn-sm w-100">View Projects</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/index.js"></script>
</body>

</html>
